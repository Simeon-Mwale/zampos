version: '3.8'

services:
  # ⚡ Core Lightning Node (Testnet for MVP)
  lightningd:
    image: lightninglabs/lightningd:v23.08
    container_name: zampos-cln
    restart: unless-stopped
    ports:
      - "9735:9735"  # Lightning P2P port
      - "9835:9835"  # REST API port
    volumes:
      - cln-data:/root/.lightning
    command: >
      --network=testnet
      --addr=0.0.0.0:9735
      --rest-addr=0.0.0.0:9835
      --rest-cors=*
      --log-level=info
      --experimental-offers  # Required for some LNBits features
    healthcheck:
      test: ["CMD", "lightning-cli", "getinfo"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 🧩 LNBits with CLN Backend
  lnbits:
    image: lnbitsdocker/lnbits:latest
    container_name: zampos-lnbits
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - lnbits-data:/data
      - ./lnbits/.env:/app/.env:ro
    environment:environment:
  - LNBITS_PORT=5000
  - LNBITS_HOST=0.0.0.0
  - LNBITS_DATABASE_URL=sqlite:////data/lnbits.db  # ✅ 4 slashes for absolute path
  - LNBITS_DATA_FOLDER=/data
  - LNBITS_BACKEND_WALLET_CLASS=CoreLightningRestWallet
  - CLN_REST_ENDPOINT=http://lightningd:9835
  - CLN_REST_CERT=/data/cln-cert.pem
  - CLN_REST_MACAROON=/data/cln-macaroon.hex
  - LNBITS_ADMIN_EXTENSIONS=usermanager
  - LNBITS_EXTENSIONS_DEFAULT_ENABLED=usermanager
  - LNBITS_CORS_ALLOW_ORIGINS=["http://localhost:3000", "https://*.ngrok-free.app"]
    depends_on:
      lightningd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/wallet"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  cln-data:
  lnbits-data: