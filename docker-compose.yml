version: '3.8'

services:
  backend:
    build: ./backend
    container_name: zampos-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LNBITS_URL=${LNBITS_URL}
      - LNBITS_API_KEY=${LNBITS_API_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - DATABASE_PATH=/data/zampos.db
    volumes:
      - zampos-data:/data

  frontend:
    build: ./frontend
    container_name: zampos-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  zampos-data:
